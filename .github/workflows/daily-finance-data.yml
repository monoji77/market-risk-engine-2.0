name: Daily Finance Data Refresh

on:
  schedule:
    # Runs every day at 6:15AM Singapore time (10:15PM UTC, previous day)
    - cron: "15 22 * * *"

  # Allows you to manually run it from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-finance-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh market data and frontend artifacts
        run: |
          python -m backend.01_read_data
          python -m backend.02_build_market_visualizations
          python -m backend.03_calculate_other_risk_measures


      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add backend/data backend/artifacts frontend/public_app

          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update daily finance data"
            git push origin HEAD:${{ github.ref_name }}
          fi
